name: Swift
on: [push]
jobs:

  macos:
    name: macOS
    runs-on: macos-26
    strategy:
      matrix:
        config: ["debug", "release"]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: swift build -c ${{ matrix.config }}
    - name: Test
      run: swift test -c ${{ matrix.config }} --no-parallel
  
  linux:
    name: Linux
    strategy:
      matrix:
        container: ["swift:6.2.3", "swift:6.3.3"]
        config: ["debug", "release"]
        options: ["", "SWIFT_BUILD_DYNAMIC_LIBRARY=1"]
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}-jammy
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: swift build -c ${{ matrix.config }}
    - name: Test
      run: swift test -c ${{ matrix.config }} --no-parallel

  # Run the full test suite on the Android x86_64 emulator with the official
  # Swift 6.3.2 Android SDK. x86_64 is the only Android ABI that GitHub-hosted
  # runners can hardware-accelerate (KVM), so it is the one architecture where
  # the tests actually execute in CI.
  android-test:
      name: Android (x86_64, test)
      runs-on: ubuntu-latest
      timeout-minutes: 60
      steps:
        - uses: actions/checkout@v4
        - name: Build and run tests on Android x86_64 emulator
          uses: skiptools/swift-android-action@v2
          env:
            SWIFT_BLUETOOTH_C_SHIMS: 0
          with:
            swift-version: 6.3.2
            run-tests: true
            build-tests: true
            free-disk-space: true
            # No --no-parallel here: the flags are passed verbatim to the on-device
            # test runner binaries, and the XCTest runner rejects that option.
            # Serial-execution races are instead fixed at the source by polling in
            # the affected tests.

  # Cross-compile the package and its tests for the ARM ABIs, which cannot be
  # executed on hosted runners (no KVM for ARM emulators), so these are
  # compile-verification steps only.
  #
  # Both use finagolfin's 6.2 SDK — the newest community Android SDK whose
  # exact Swift version matches a published Docker image (Swift SDK .swiftmodule
  # files require an exact compiler match). The official swift.org Android SDK is
  # deliberately not used here: it declares `sdkRootPath: ndk-sysroot` but ships
  # no sysroot of its own, so it needs a separately installed Android NDK and
  # fails with "'semaphore.h' file not found" in a plain toolchain container.
  # (The x86_64 job above can use the official SDK because swift-android-action
  # installs and wires up the NDK for it.)
  android-build-arm:
      name: Android (${{ matrix.arch }}, build)
      runs-on: ubuntu-latest
      container: swift:6.2.0
      strategy:
        fail-fast: false
        matrix:
          include:
            - arch: aarch64
              triple: aarch64-unknown-linux-android24
            - arch: armv7
              triple: armv7-unknown-linux-androideabi24
      steps:
        - uses: actions/checkout@v4
        - name: Install Android Swift SDK
          run: swift sdk install https://github.com/finagolfin/swift-android-sdk/releases/download/6.2/swift-6.2-RELEASE-android-24-0.1.artifactbundle.tar.gz --checksum c26ebfd4e32c0ca1beabcc45729b62042da57ee76d7d043f63f2235da90dc491
        - name: Build tests for Android ${{ matrix.arch }}
          run: SWIFT_BLUETOOTH_C_SHIMS=0 swift build --build-tests --swift-sdk ${{ matrix.triple }}