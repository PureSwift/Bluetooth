name: Swift
on: [push]
jobs:

  macos:
    name: macOS
    runs-on: macos-26
    strategy:
      matrix:
        config: ["debug", "release"]
        options: ["", "SWIFT_BUILD_DYNAMIC_LIBRARY=1"]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: ${{ matrix.options }} swift build -c ${{ matrix.config }}
    - name: Test
      run: ${{ matrix.options }} swift test -c ${{ matrix.config }}
  
  linux:
    name: Linux
    strategy:
      matrix:
        container: ["swift:6.0.3", "swift:6.1.2", "swift:6.2.3", "swift:6.3.2"]
        config: ["debug", "release"]
        options: ["", "SWIFT_BUILD_DYNAMIC_LIBRARY=1"]
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}-jammy
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: ${{ matrix.options }} swift build -c ${{ matrix.config }}
    - name: Test
      run: ${{ matrix.options }} swift test -c ${{ matrix.config }}

  # Run the full test suite on the Android x86_64 emulator. x86_64 is the only
  # Android ABI that GitHub-hosted runners can hardware-accelerate (KVM), so it
  # is the one architecture where the tests actually execute in CI.
  android-test:
      name: Android (x86_64, test)
      runs-on: ubuntu-latest
      timeout-minutes: 60
      steps:
        - uses: actions/checkout@v4
        - name: Build and run tests on Android x86_64 emulator
          uses: skiptools/swift-android-action@v2
          env:
            SWIFT_BLUETOOTH_C_SHIMS: 0
          with:
            run-tests: true
            build-tests: true
            free-disk-space: true

  # Cross-compile the package and its tests for the 32-bit (armv7) and 64-bit
  # (aarch64) ARM ABIs. These cannot be executed on hosted runners (no KVM for
  # ARM emulators, and armv7 emulator system images are unavailable), so this
  # is a compile-verification step — matching the official Swift Android SDK CI.
  android-build:
      name: Android (${{ matrix.arch }}, build)
      runs-on: ubuntu-latest
      # The container Swift version must EXACTLY match the Swift version the
      # Android SDK bundle was built with (Swift SDK .swiftmodule files are not
      # cross-compiler-compatible), so pin both to 6.1.3.
      container: swift:6.1.3
      strategy:
        fail-fast: false
        matrix:
          include:
            - arch: aarch64
              sdk: aarch64-unknown-linux-android24
            - arch: armv7
              sdk: armv7-unknown-linux-androideabi24
      steps:
        - uses: actions/checkout@v4
        - name: Install Android Swift SDK
          run: swift sdk install https://github.com/finagolfin/swift-android-sdk/releases/download/6.1.3/swift-6.1.3-RELEASE-android-24-0.1.artifactbundle.tar.gz --checksum 440d09d539bda5b94807598b00696ac5d3893cb515b24715ac8868d62130b6d5
        - name: Build tests for Android ${{ matrix.arch }}
          run: SWIFT_BLUETOOTH_C_SHIMS=0 swift build --build-tests --swift-sdk ${{ matrix.sdk }}