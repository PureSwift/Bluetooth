name: Swift
on: [push]
jobs:

  macos:
    name: macOS
    runs-on: macos-26
    strategy:
      matrix:
        config: ["debug", "release"]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: swift build -c ${{ matrix.config }}
    - name: Test
      run: swift test -c ${{ matrix.config }} --no-parallel
  
  linux:
    name: Linux
    strategy:
      matrix:
        container: ["swift:6.2.3", "swift:6.3.3"]
        config: ["debug", "release"]
        options: ["", "SWIFT_BUILD_DYNAMIC_LIBRARY=1"]
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}-jammy
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build
      run: swift build -c ${{ matrix.config }}
    - name: Test
      run: swift test -c ${{ matrix.config }} --no-parallel

  # Run the full test suite on the Android x86_64 emulator with the official
  # Swift 6.3.2 Android SDK. x86_64 is the only Android ABI that GitHub-hosted
  # runners can hardware-accelerate (KVM), so it is the one architecture where
  # the tests actually execute in CI.
  android-test:
      name: Android (x86_64, test)
      runs-on: ubuntu-latest
      timeout-minutes: 60
      steps:
        - uses: actions/checkout@v4
        - name: Build and run tests on Android x86_64 emulator
          uses: skiptools/swift-android-action@v2
          env:
            SWIFT_BLUETOOTH_C_SHIMS: 0
          with:
            swift-version: 6.3.2
            run-tests: true
            build-tests: true
            free-disk-space: true
            # No --no-parallel here: the flags are passed verbatim to the on-device
            # test runner binaries, and the XCTest runner rejects that option.
            # Serial-execution races are instead fixed at the source by polling in
            # the affected tests.

  # Cross-compile the package and its tests for the ARM ABIs, which cannot be
  # executed on hosted runners (no KVM for ARM emulators), so these are
  # compile-verification steps only.
  #
  # Uses the official swift.org Android SDK (matching the toolchain used by the
  # android-test job above, since Swift SDK .swiftmodule files require an exact
  # compiler match). The bundle declares `sdkRootPath: ndk-sysroot` but ships no
  # sysroot of its own — scripts/setup-android-sdk.sh, included in the bundle,
  # builds it from a separately installed Android NDK (r27d+), which is what the
  # steps below do. The bundle's oldest supported API level is 28, hence the
  # android28 triples (finagolfin's community SDK, used previously, went down
  # to android24).
  android-build-arm:
      name: Android (${{ matrix.arch }}, build)
      runs-on: ubuntu-latest
      container: swift:6.3.2-jammy
      strategy:
        fail-fast: false
        matrix:
          include:
            - arch: aarch64
              triple: aarch64-unknown-linux-android28
            - arch: armv7
              triple: armv7-unknown-linux-android28
      steps:
        - uses: actions/checkout@v4
        - name: Install Android Swift SDK and NDK sysroot
          # The container's default shell is dash, which has no `pipefail`.
          shell: bash
          run: |
            set -euo pipefail
            apt-get update && apt-get install -y unzip
            swift sdk install https://download.swift.org/swift-6.3.2-release/android-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_android.artifactbundle.tar.gz --checksum 939e933549d12d28f2e0bf71019d734d309859e9773c572657ce565a81f85d68
            # SwiftPM resolves its data directory from the passwd entry rather than
            # $HOME, so inside the container the bundle can land under /root even
            # though $HOME is /github/home. Probe the known locations.
            for candidate in "${HOME}/.swiftpm" "${HOME}/.config/swiftpm" "${HOME}/.local/swiftpm" /root/.swiftpm; do
              if [ -d "${candidate}/swift-sdks/swift-6.3.2-RELEASE_android.artifactbundle/swift-android" ]; then
                SWIFTPM_DIR="${candidate}"
                break
              fi
            done
            if [ -z "${SWIFTPM_DIR:-}" ]; then
              echo "Could not locate the installed Android Swift SDK bundle" >&2
              swift sdk list >&2 || true
              exit 1
            fi
            cd "${SWIFTPM_DIR}"
            curl -fSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
            unzip -qo ndk.zip
            rm ndk.zip
            export ANDROID_NDK_HOME="$PWD/android-ndk-r27d"
            ./swift-sdks/swift-6.3.2-RELEASE_android.artifactbundle/swift-android/scripts/setup-android-sdk.sh
        - name: Build tests for Android ${{ matrix.arch }}
          run: SWIFT_BLUETOOTH_C_SHIMS=0 swift build --build-tests --swift-sdk ${{ matrix.triple }}