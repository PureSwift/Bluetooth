name: Swift Embedded
on: [push]
jobs:
  build-embedded:
    name: Build for Embedded Swift
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.3.2"]
        target: ["Bluetooth", "BluetoothGAP", "BluetoothGATT", "BluetoothHCI"]
        config: ["debug", "release"]
    container: swift:${{ matrix.swift }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Swift Version
        run: swift --version
      - name: Install dependencies
        run: apt-get update -y && apt-get install -y curl
      - name: Install WASM SDK
        run: |
          set -eux
          url="https://download.swift.org/swift-${{ matrix.swift }}-release/wasm-sdk/swift-${{ matrix.swift }}-RELEASE/swift-${{ matrix.swift }}-RELEASE_wasm.artifactbundle.tar.gz"
          curl -fsSL "$url" -o wasm.artifactbundle.tar.gz
          swift sdk install wasm.artifactbundle.tar.gz
          swift sdk list
      - name: Build
        run: SWIFTPM_BLUETOOTH_METADATA=0 SWIFTPM_ENABLE_MACROS=0 swift build --target ${{ matrix.target }} -c ${{ matrix.config }} --swift-sdk swift-${{ matrix.swift }}-RELEASE_wasm-embedded
